name: Backend Unit Gate

# Fast, infrastructure-free gate: type-check, build, and the Jest `unit`
# project (no Postgres/Redis required). Integration tests live in a separate
# command (`npm run test:integration`) because they need a live database.
#
# This is an npm-workspaces monorepo with a single root package-lock.json,
# so install happens at the root and backend scripts run via --workspace.

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'package-lock.json'
      - '.github/workflows/backend-unit.yml'
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'package-lock.json'
      - '.github/workflows/backend-unit.yml'

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: backend-unit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Type-check, build & unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies (workspace root)
        run: npm ci

      - name: Type-check
        run: npm run type-check --workspace backend

      - name: Build
        run: npm run build --workspace backend

      - name: Unit tests
        run: npm test --workspace backend
        env:
          NODE_ENV: test
