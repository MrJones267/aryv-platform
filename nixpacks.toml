# Nixpacks configuration for Railway deployment

[variables]
NIXPACKS_NODE_VERSION = "20"

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["cd backend && npm install --legacy-peer-deps"]

[phases.build]
cmds = ["cd backend && npm run build"]

[start]
cmd = "node backend/dist/index.js"
